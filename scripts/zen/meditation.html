<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zen</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-1: #0d1117;
            --bg-2: #161b22;
            --bg-3: #1a2332;
            --accent: rgba(100, 180, 255, 0.8);
            --accent-glow: rgba(100, 180, 255, 0.12);
            --text: rgba(230, 237, 243, 0.9);
            --text-dim: rgba(230, 237, 243, 0.35);
            --text-phase: rgba(100, 180, 255, 0.9);
        }

        .theme-ocean {
            --bg-1: #0a192f; --bg-2: #112240; --bg-3: #1a3a5c;
            --accent: rgba(100, 255, 218, 0.8);
            --accent-glow: rgba(100, 255, 218, 0.12);
            --text-phase: rgba(100, 255, 218, 0.9);
        }
        .theme-forest {
            --bg-1: #0d1a0d; --bg-2: #152415; --bg-3: #1e3a1e;
            --accent: rgba(156, 204, 156, 0.8);
            --accent-glow: rgba(156, 204, 156, 0.12);
            --text-phase: rgba(156, 204, 156, 0.9);
        }
        .theme-waterfall {
            --bg-1: #0d1a1a; --bg-2: #15292a; --bg-3: #1e3a3a;
            --accent: rgba(130, 210, 220, 0.8);
            --accent-glow: rgba(130, 210, 220, 0.12);
            --text-phase: rgba(130, 210, 220, 0.9);
        }
        .theme-spring {
            --bg-1: #1a0d1a; --bg-2: #2a1530; --bg-3: #3a1e3a;
            --accent: rgba(240, 180, 210, 0.8);
            --accent-glow: rgba(240, 180, 210, 0.12);
            --text-phase: rgba(240, 180, 210, 0.9);
        }

        body {
            background: linear-gradient(160deg, var(--bg-1), var(--bg-2), var(--bg-3));
            color: var(--text);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            user-select: none;
        }

        /* ── Video background ─────────────────────── */
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #video-bg.loaded { opacity: 1; }

        #video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Start overlay ─────────────────────────── */
        #start-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            background: linear-gradient(160deg, var(--bg-1), var(--bg-2));
            cursor: pointer;
            transition: opacity 1.5s ease;
        }
        #start-overlay.hidden { opacity: 0; pointer-events: none; }
        #start-overlay h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.6em;
            text-transform: lowercase;
            color: var(--text);
        }
        #start-overlay p {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
        }

        /* ── Meditation container ──────────────────── */
        #meditation {
            position: relative;
            z-index: 10;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #meditation.visible { opacity: 1; }

        #title {
            font-size: 0.8rem;
            letter-spacing: 0.6em;
            text-transform: lowercase;
            color: var(--text-dim);
        }

        /* ── Breathing circle ──────────────────────── */
        #circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            box-shadow:
                0 0 50px var(--accent-glow),
                0 0 100px var(--accent-glow),
                inset 0 0 50px var(--accent-glow);
            transform: scale(0.5);
        }

        #phase-text {
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: lowercase;
            color: var(--text-phase);
            font-weight: 300;
        }

        #countdown {
            font-size: 2.8rem;
            font-weight: 200;
            color: var(--text);
            line-height: 1;
            opacity: 0.8;
        }

        /* ── Guidance text (body scan & quotes) ────── */
        #guidance {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            text-align: center;
            max-width: 480px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #guidance.visible { opacity: 1; }
        .region-label {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: lowercase;
            color: var(--text-phase);
            font-weight: 300;
        }
        .guidance-body {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 2;
            color: var(--text);
        }
        .quote-text {
            font-size: 1.4rem;
            font-weight: 300;
            line-height: 2;
            color: var(--text);
            font-style: italic;
        }
        .quote-author {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            margin-top: 0.5rem;
        }
        .reflection {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 300;
            font-style: italic;
            margin-top: 1rem;
        }

        /* ── Timer ─────────────────────────────────── */
        #timer {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.3em;
            font-weight: 300;
        }

        /* ── Progress ──────────────────────────────── */
        #progress {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 1.5px;
            background: rgba(255,255,255,0.04);
            border-radius: 1px;
            overflow: hidden;
            z-index: 20;
        }
        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            opacity: 0.5;
            transition: width 1s linear;
        }

        /* ── Skip button ───────────────────────────── */
        #skip-btn {
            position: fixed;
            bottom: 1.2rem;
            right: 1.5rem;
            background: none;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-dim);
            font-size: 0.7rem;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            z-index: 30;
            letter-spacing: 0.1em;
            font-family: inherit;
            transition: border-color 0.3s, color 0.3s, opacity 0.3s;
            opacity: 0;
        }
        #skip-btn.visible { opacity: 1; }
        #skip-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

        /* ── Completion ────────────────────────────── */
        #completion {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0;
            transition: opacity 2.5s ease;
        }
        #completion h2 {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: var(--text);
        }
        #completion p {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 300;
        }
    </style>
</head>
<body>
    <video id="video-bg" autoplay loop muted playsinline></video>
    <div id="video-overlay"></div>
    <canvas id="nature-canvas"></canvas>

    <div id="start-overlay" onclick="beginSession()">
        <h1>zen</h1>
        <p>tap anywhere to begin</p>
    </div>

    <div id="meditation">
        <div id="title">zen</div>
        <div id="circle">
            <div id="phase-text">breathe in</div>
            <div id="countdown">4</div>
        </div>
        <div id="guidance"></div>
        <div id="timer"></div>
    </div>

    <div id="completion">
        <h2>session complete</h2>
        <p>carry this calm with you</p>
    </div>

    <div id="progress"><div id="progress-fill"></div></div>
    <button id="skip-btn" onclick="endSession()">end session</button>

    <!-- Injected by zen.py: voice data, video path, video-has-audio flag -->
    <script>const VOICE_DATA = {};</script>
    <script>const VIDEO_PATH = '';</script>
    <script>const USE_VIDEO_AUDIO = false;</script>
    <script>const AUDIO_PATH = '';</script>

    <script>
    // ─── Config ─────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const THEMES = ['rain', 'ocean', 'forest', 'waterfall', 'river', 'night', 'thunderstorm', 'campfire', 'spring'];
    const TYPES = ['breathing', 'body_scan', 'quotes', 'gratitude', 'visualization', 'metta', 'affirmation'];
    const CONFIG = {
        theme: params.get('theme') || THEMES[Math.floor(Math.random() * THEMES.length)],
        duration: parseInt(params.get('duration')) || 120,
        type: params.get('type') || TYPES[Math.floor(Math.random() * TYPES.length)],
    };

    document.body.classList.add('theme-' + CONFIG.theme);

    // ─── DOM refs ───────────────────────────────────────────
    const cvs = document.getElementById('nature-canvas');
    const cx = cvs.getContext('2d');
    const circleEl = document.getElementById('circle');
    const phaseTextEl = document.getElementById('phase-text');
    const countdownEl = document.getElementById('countdown');
    const guidanceEl = document.getElementById('guidance');
    const timerEl = document.getElementById('timer');
    const progressFill = document.getElementById('progress-fill');
    const meditationEl = document.getElementById('meditation');
    const completionEl = document.getElementById('completion');
    const startOverlay = document.getElementById('start-overlay');
    const skipBtn = document.getElementById('skip-btn');

    // ─── Video background ────────────────────────────────────
    const videoBg = document.getElementById('video-bg');
    if (VIDEO_PATH) {
        videoBg.src = VIDEO_PATH;
        // Video starts muted via HTML autoplay attribute (plays visually)
        videoBg.addEventListener('canplay', () => videoBg.classList.add('loaded'));
        videoBg.addEventListener('error', () => { /* canvas fallback */ });
    }

    // ─── Canvas resize ──────────────────────────────────────
    function resize() { cvs.width = innerWidth; cvs.height = innerHeight; }
    resize();
    addEventListener('resize', resize);

    // ═══════════════════════════════════════════════════════════
    //  NATURE SCENE — Canvas animations per theme
    // ═══════════════════════════════════════════════════════════
    let particles = [];

    function initScene() {
        particles = [];
        if (CONFIG.theme === 'rain') {
            for (let i = 0; i < 180; i++) particles.push({
                x: Math.random() * cvs.width,
                y: Math.random() * cvs.height,
                len: 12 + Math.random() * 22,
                speed: 5 + Math.random() * 7,
                opacity: 0.06 + Math.random() * 0.12,
                w: 0.4 + Math.random() * 0.6,
            });
        } else if (CONFIG.theme === 'forest') {
            for (let i = 0; i < 35; i++) particles.push({
                x: Math.random() * cvs.width,
                y: Math.random() * cvs.height,
                r: 1 + Math.random() * 2.5,
                vx: (Math.random() - 0.5) * 0.25,
                vy: (Math.random() - 0.5) * 0.15,
                phase: Math.random() * Math.PI * 2,
            });
        } else if (CONFIG.theme === 'waterfall') {
            for (let i = 0; i < 55; i++) particles.push({
                x: Math.random() * cvs.width,
                y: Math.random() * cvs.height,
                r: 0.8 + Math.random() * 1.5,
                speed: 0.4 + Math.random() * 1.2,
                sway: Math.random() * Math.PI * 2,
                opacity: 0.04 + Math.random() * 0.1,
            });
        }
    }

    function drawScene(t) {
        cx.clearRect(0, 0, cvs.width, cvs.height);
        const s = t * 0.001;

        if (CONFIG.theme === 'rain') {
            for (const p of particles) {
                cx.beginPath();
                cx.moveTo(p.x, p.y);
                cx.lineTo(p.x + 0.4, p.y + p.len);
                cx.strokeStyle = `rgba(174, 194, 224, ${p.opacity})`;
                cx.lineWidth = p.w;
                cx.stroke();
                p.y += p.speed;
                if (p.y > cvs.height + p.len) { p.y = -p.len; p.x = Math.random() * cvs.width; }
            }
        } else if (CONFIG.theme === 'ocean') {
            for (let layer = 0; layer < 5; layer++) {
                cx.beginPath();
                const base = cvs.height * 0.52 + layer * 32;
                const amp = 22 - layer * 3;
                const freq = 0.0025 + layer * 0.0008;
                const sp = s * (0.25 + layer * 0.12);
                for (let x = 0; x <= cvs.width; x += 3) {
                    const y = base
                        + Math.sin(x * freq + sp) * amp
                        + Math.sin(x * freq * 2.3 + sp * 1.3) * amp * 0.35
                        + Math.sin(x * freq * 0.6 + sp * 0.5) * amp * 0.25;
                    x === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
                }
                cx.lineTo(cvs.width, cvs.height);
                cx.lineTo(0, cvs.height);
                cx.closePath();
                cx.fillStyle = `rgba(80, 180, 200, ${0.06 - layer * 0.01})`;
                cx.fill();
            }
        } else if (CONFIG.theme === 'forest') {
            for (const p of particles) {
                const pulse = Math.sin(s * 0.4 + p.phase) * 0.5 + 0.5;
                const r = p.r * (0.7 + pulse * 0.5);
                const a = (0.08 + pulse * 0.12);
                cx.beginPath();
                cx.arc(p.x, p.y, r, 0, Math.PI * 2);
                cx.fillStyle = `rgba(170, 210, 140, ${a})`;
                cx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.x < -10) p.x = cvs.width + 10;
                if (p.x > cvs.width + 10) p.x = -10;
                if (p.y < -10) p.y = cvs.height + 10;
                if (p.y > cvs.height + 10) p.y = -10;
            }
        } else if (CONFIG.theme === 'waterfall') {
            for (const p of particles) {
                const sway = Math.sin(s * 0.25 + p.sway) * 15;
                cx.beginPath();
                cx.arc(p.x, p.y + sway, p.r, 0, Math.PI * 2);
                cx.fillStyle = `rgba(190, 205, 220, ${p.opacity})`;
                cx.fill();
                p.x += p.speed;
                if (p.x > cvs.width + 10) { p.x = -10; p.y = Math.random() * cvs.height; }
            }
        }
    }

    // ═══════════════════════════════════════════════════════════
    //  NATURE SOUND — Web Audio API
    // ═══════════════════════════════════════════════════════════
    let audioCtx, masterGain;

    function startSound() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const sr = audioCtx.sampleRate;
        const len = sr * 8;
        const buf = audioCtx.createBuffer(2, len, sr);

        for (let ch = 0; ch < 2; ch++) {
            const d = buf.getChannelData(ch);
            if (CONFIG.theme === 'ocean') {
                // Brown noise (integrated white noise)
                let last = 0;
                for (let i = 0; i < len; i++) {
                    const w = Math.random() * 2 - 1;
                    d[i] = (last + 0.02 * w) / 1.02;
                    last = d[i];
                    d[i] *= 3.5;
                }
            } else {
                // White noise base
                for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
            }
        }

        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.loop = true;
        let node = src;

        if (CONFIG.theme === 'rain') {
            // Low-pass → warm rain patter
            const lp = audioCtx.createBiquadFilter();
            lp.type = 'lowpass'; lp.frequency.value = 450; lp.Q.value = 0.6;
            node.connect(lp); node = lp;
            // Subtle high-pass to remove rumble
            const hp = audioCtx.createBiquadFilter();
            hp.type = 'highpass'; hp.frequency.value = 60;
            node.connect(hp); node = hp;
        } else if (CONFIG.theme === 'ocean') {
            // Low-pass for deep ocean
            const lp = audioCtx.createBiquadFilter();
            lp.type = 'lowpass'; lp.frequency.value = 220;
            node.connect(lp); node = lp;
            // Slow wave modulation
            const waveGain = audioCtx.createGain();
            waveGain.gain.value = 0.75;
            const lfo = audioCtx.createOscillator();
            const lfoAmp = audioCtx.createGain();
            lfo.frequency.value = 0.055;
            lfoAmp.gain.value = 0.25;
            lfo.connect(lfoAmp); lfoAmp.connect(waveGain.gain); lfo.start();
            node.connect(waveGain); node = waveGain;
        } else if (CONFIG.theme === 'forest') {
            // Band-pass for rustling leaves
            const bp = audioCtx.createBiquadFilter();
            bp.type = 'bandpass'; bp.frequency.value = 1100; bp.Q.value = 0.4;
            node.connect(bp); node = bp;
        } else if (CONFIG.theme === 'waterfall') {
            // Waterfall: mid-range white noise (rushing water)
            const lp = audioCtx.createBiquadFilter();
            lp.type = 'lowpass'; lp.frequency.value = 800; lp.Q.value = 0.3;
            node.connect(lp); node = lp;
            const hp = audioCtx.createBiquadFilter();
            hp.type = 'highpass'; hp.frequency.value = 80;
            node.connect(hp); node = hp;
        }

        // Master volume — fade in over 3 seconds
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0.28, audioCtx.currentTime + 3);
        node.connect(masterGain);
        masterGain.connect(audioCtx.destination);
        src.start();
    }

    function fadeOutSound() {
        // Fade out Web Audio if active
        if (masterGain && audioCtx) {
            masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);
            setTimeout(() => { try { audioCtx.close(); } catch(e) {} }, 4000);
        }
        // Fade out background nature audio
        if (window._bgAudio) {
            let vol = window._bgAudio.volume;
            const fadeOut = setInterval(() => {
                vol -= 0.01;
                if (vol <= 0) { window._bgAudio.pause(); clearInterval(fadeOut); return; }
                window._bgAudio.volume = vol;
            }, 50);
        }
    }

    // ═══════════════════════════════════════════════════════════
    //  VOICE PLAYBACK (from embedded base64 data)
    // ═══════════════════════════════════════════════════════════
    function playVoice(name) {
        return new Promise(resolve => {
            if (!VOICE_DATA[name]) { resolve(); return; }
            const audio = new Audio(VOICE_DATA[name]);
            audio.volume = 0.9;
            audio.onended = resolve;
            audio.onerror = resolve;
            audio.play().catch(resolve);
        });
    }

    // ═══════════════════════════════════════════════════════════
    //  MEDITATION LOGIC
    // ═══════════════════════════════════════════════════════════
    const PATTERNS = {
        box:      [{ p:'in', l:'breathe in', d:4 }, { p:'hold_in', l:'hold', d:4 }, { p:'out', l:'breathe out', d:4 }, { p:'hold_out', l:'rest', d:4 }],
        relaxing: [{ p:'in', l:'breathe in', d:4 }, { p:'hold_in', l:'hold', d:7 }, { p:'out', l:'breathe out', d:8 }],
        coherent: [{ p:'in', l:'breathe in', d:6 }, { p:'out', l:'breathe out', d:6 }],
    };

    const BODY_SCAN = [
        { region: 'crown & forehead', text: 'Bring your awareness to the top of your head.<br>Notice any sensations. Let your forehead soften.', voice: 'scan_head' },
        { region: 'eyes & jaw', text: 'Relax the muscles around your eyes.<br>Unclench your jaw. Let your tongue rest.', voice: 'scan_face' },
        { region: 'shoulders', text: 'Drop your shoulders away from your ears.<br>Feel the weight releasing with each exhale.', voice: 'scan_shoulders' },
        { region: 'hands', text: 'Notice your hands, wherever they are.<br>Let any tension dissolve like warmth spreading.', voice: 'scan_hands' },
        { region: 'chest', text: 'Feel your chest rise and fall with each breath.<br>Let each exhale carry away a little more tension.', voice: 'scan_chest' },
        { region: 'belly', text: 'Soften your belly completely.<br>There\'s nothing to hold. Let it be free.', voice: 'scan_belly' },
        { region: 'feet & ground', text: 'Feel your connection to the earth below.<br>You are supported. You are here.', voice: 'scan_feet' },
    ];

    const QUOTES = [
        { text: 'Between stimulus and response<br>there is a space.<br>In that space is our freedom.', author: 'Viktor Frankl', voice: 'quote_0' },
        { text: 'Nature does not hurry,<br>yet everything is accomplished.', author: 'Lao Tzu', voice: 'quote_1' },
        { text: 'You are the sky.<br>Everything else is just the weather.', author: 'Pema Chödrön', voice: 'quote_2' },
        { text: 'The quieter you become,<br>the more you can hear.', author: 'Ram Dass', voice: 'quote_3' },
        { text: 'Smile, breathe, and go slowly.', author: 'Thich Nhat Hanh', voice: 'quote_4' },
        { text: 'Almost everything will work again<br>if you unplug it for a few minutes.<br>Including you.', author: 'Anne Lamott', voice: 'quote_5' },
        { text: 'Within you there is a stillness<br>and a sanctuary to which you can retreat<br>at any time.', author: 'Hermann Hesse', voice: 'quote_6' },
        { text: 'When you realize nothing is lacking,<br>the whole world belongs to you.', author: 'Lao Tzu', voice: 'quote_7' },
        { text: 'Life is available only<br>in the present moment.', author: 'Thich Nhat Hanh', voice: 'quote_8' },
        { text: 'The mind is everything.<br>What you think, you become.', author: 'Buddha', voice: 'quote_9' },
        { text: 'Peace comes from within.<br>Do not seek it without.', author: 'Buddha', voice: 'quote_10' },
        { text: 'The present moment is filled with joy<br>and happiness. If you are attentive,<br>you will see it.', author: 'Thich Nhat Hanh', voice: 'quote_11' },
        { text: 'In today\'s rush, we all think too much,<br>seek too much, want too much.<br>And forget about the joy of just being.', author: 'Eckhart Tolle', voice: 'quote_12' },
        { text: 'Your calm mind is the ultimate weapon<br>against your challenges.', author: 'Bryant McGill', voice: 'quote_13' },
        { text: 'Nothing can bring you peace<br>but yourself.', author: 'Ralph Waldo Emerson', voice: 'quote_14' },
        { text: 'Be still.<br>Stillness reveals the secrets of eternity.', author: 'Lao Tzu', voice: 'quote_15' },
        { text: 'Wherever you are,<br>be there totally.', author: 'Eckhart Tolle', voice: 'quote_16' },

    // ─── State ──────────────────────────────────────────────
    let active = false;
    let sessionStart = 0;
    let breathingRAF = null;

    // ─── Easing ─────────────────────────────────────────────
    function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2; }

    // ─── Breathing ──────────────────────────────────────────
    // Voice cue map: phase → voice file name
    const PHASE_VOICE = { 'in': 'breathe_in', 'hold_in': 'hold', 'out': 'breathe_out', 'hold_out': 'rest' };
    // Random mindfulness cues spoken between breathing cycles
    const MINDFUL_CUES = [
        'cue_forehead', 'cue_shoulders', 'cue_tension', 'cue_ground',
        'cue_space', 'cue_breath_deep', 'cue_body_soft', 'cue_present',
        'cue_jaw', 'cue_hands', 'cue_letgo', 'cue_backstraight',
        'cue_relax', 'cue_focus', 'cue_chest_open', 'cue_eyes_soft',
        'cue_belly_breathe', 'cue_nothing_todo', 'cue_warmth', 'cue_smile'
    ];
    let lastVoicedPhase = '';
    let breathCycleCount = 0;
    let lastCueIndex = -1;

    function runBreathing() {
        const names = Object.keys(PATTERNS);
        const pattern = PATTERNS[names[Math.floor(Math.random() * names.length)]];
        const cycle = pattern.reduce((s, p) => s + p.d, 0);

        circleEl.style.display = 'flex';
        guidanceEl.style.display = 'none';
        lastVoicedPhase = '';

        // Wait 1.5s so "zen" title is visible before voice starts
        setTimeout(() => playVoice('intro_breathing'), 1500);

        function tick() {
            if (!active) return;
            const elapsed = (Date.now() - sessionStart) / 1000;
            const pos = elapsed % cycle;
            let off = 0;

            for (const step of pattern) {
                if (pos < off + step.d) {
                    const prog = (pos - off) / step.d;
                    const e = ease(prog);
                    let sc;
                    if (step.p === 'in') sc = 0.5 + 0.5 * e;
                    else if (step.p === 'out') sc = 1.0 - 0.5 * e;
                    else if (step.p === 'hold_in') sc = 1.0;
                    else sc = 0.5;

                    circleEl.style.transform = `scale(${sc})`;
                    circleEl.style.borderColor = `var(--accent)`;
                    circleEl.style.boxShadow = `0 0 ${40 + sc * 30}px var(--accent-glow), 0 0 ${80 + sc * 40}px var(--accent-glow), inset 0 0 ${40 + sc * 20}px var(--accent-glow)`;
                    phaseTextEl.textContent = step.l;
                    countdownEl.textContent = Math.ceil(step.d - (pos - off));

                    // Play voice cue at each phase transition
                    if (step.p !== lastVoicedPhase) {
                        lastVoicedPhase = step.p;
                        const voiceName = PHASE_VOICE[step.p];
                        if (voiceName) playVoice(voiceName);

                        // Every 3rd cycle, speak a random mindfulness cue on 'hold_in'
                        if (step.p === 'in') breathCycleCount++;
                        if (step.p === 'hold_in' && breathCycleCount > 0 && breathCycleCount % 3 === 0) {
                            let idx;
                            do { idx = Math.floor(Math.random() * MINDFUL_CUES.length); } while (idx === lastCueIndex);
                            lastCueIndex = idx;
                            setTimeout(() => playVoice(MINDFUL_CUES[idx]), 1500);
                        }
                    }
                    break;
                }
                off += step.d;
            }
            breathingRAF = requestAnimationFrame(tick);
        }
        tick();
    }

            playVoice(step.voice);
            await sleep(stepTime * 1000 - 1500);

    // ─── Session lifecycle ──────────────────────────────────
    function beginSession() {
        startOverlay.classList.add('hidden');

        // Play nature audio from extracted MP3 file (video stays muted for visuals)
        if (USE_VIDEO_AUDIO && AUDIO_PATH) {
            window._bgAudio = new Audio(AUDIO_PATH);
            window._bgAudio.loop = true;
            window._bgAudio.volume = 0;
            window._bgAudio.play().then(() => {
                // Fade in to 0.35
                let vol = 0;
                const fadeIn = setInterval(() => {
                    vol += 0.007;
                    if (vol >= 0.35) { window._bgAudio.volume = 0.35; clearInterval(fadeIn); return; }
                    window._bgAudio.volume = vol;
                }, 50);
            }).catch(() => {
                // Fallback to Web Audio synthesis
                startSound();
            });
        } else {
            startSound();
        }
        initScene();

        // Request fullscreen for immersive experience
        try { document.documentElement.requestFullscreen(); } catch(e) {}

        // Show "zen" title and speak it first
        setTimeout(() => {
            meditationEl.classList.add('visible');
            skipBtn.classList.add('visible');
            // Brief pause for "zen" title to show, then start exercise
            sleep(1000).then(() => {
                active = true;
                sessionStart = Date.now();
                if (CONFIG.type === 'breathing') runBreathing();
                else if (CONFIG.type === 'body_scan') runBodyScan();
                else if (CONFIG.type === 'quotes') runQuotes();
                else if (CONFIG.type === 'gratitude') runGratitude();
                else if (CONFIG.type === 'visualization') runVisualization();
                else if (CONFIG.type === 'metta') runMetta();
                else if (CONFIG.type === 'affirmation') runAffirmation();
            });
        }, 1500);
    }

    async function endSession() {
        if (!active) return;
        active = false;
        if (breathingRAF) cancelAnimationFrame(breathingRAF);

        // Fade out meditation UI
        meditationEl.style.transition = 'opacity 2s ease';
        meditationEl.style.opacity = 0;
        skipBtn.style.opacity = 0;

        // "Gently open your eyes"
        await playVoice('outro');
        await sleep(2000);

        // Pick a lesson never seen before (tracked in localStorage)
        let seen = [];
        try { seen = JSON.parse(localStorage.getItem('zen_seen_lessons') || '[]'); } catch(e) {}
        let unseen = LESSONS.filter((_, i) => !seen.includes(i));
        if (unseen.length === 0) { seen = []; unseen = LESSONS; } // Reset cycle
        const idx = LESSONS.indexOf(unseen[Math.floor(Math.random() * unseen.length)]);
        seen.push(idx);
        try { localStorage.setItem('zen_seen_lessons', JSON.stringify(seen)); } catch(e) {}
        const lesson = LESSONS[idx];
        meditationEl.style.display = 'none';

        guidanceEl.style.display = 'flex';
        guidanceEl.style.opacity = 0;
        guidanceEl.innerHTML = `
            <div class="quote-text" style="font-style:normal;font-size:1.3rem;">${lesson.text}</div>
            ${lesson.source ? `<div class="quote-author">— ${lesson.source}</div>` : ''}
        `;

        // Fade in lesson
        completionEl.style.display = 'flex';
        completionEl.innerHTML = '';
        completionEl.appendChild(guidanceEl);
        completionEl.style.opacity = 0;
        await sleep(100);
        completionEl.style.opacity = 1;
        guidanceEl.style.opacity = 1;

        // Speak the lesson
        await playVoice(lesson.voice);

        // Hold for a few seconds to let it sink in
        await sleep(5000);

        // Fade out everything
        completionEl.style.transition = 'opacity 3s ease';
        completionEl.style.opacity = 0;
        fadeOutSound();

        await sleep(4000);
        try { window.close(); } catch(e) {}
    }

    // ─── Animation loop ─────────────────────────────────────
    function loop(t) {
        drawScene(t);
        if (active) {
            const elapsed = (Date.now() - sessionStart) / 1000;
            const rem = Math.max(0, CONFIG.duration - elapsed);
            const m = Math.floor(rem / 60);
            const s = Math.floor(rem % 60);
            timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
            progressFill.style.width = `${(elapsed / CONFIG.duration) * 100}%`;
            if (rem <= 0) endSession();
        }
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ─── Keyboard ───────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' || e.key === 'q' || e.key === ' ') endSession();
    });

    // ─── Utilities ──────────────────────────────────────────
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function shuffle(a) {
        const b = [...a];
        for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
        }
        return b;
    }
